<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Марийский этнограф — смешанная викторина</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', 'Georgia', serif;
            background: linear-gradient(145deg, #2c2b26 0%, #4a3b28 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .game-box {
            max-width: 850px;
            width: 100%;
            background: #fef7e0;
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            overflow: hidden;
            padding: 25px 30px 35px;
            border: 1px solid #e9cf9e;
        }
        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin: 0 0 5px 0;
            color: #3a5e2b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 0.8rem;
            background: #dac282;
            padding: 4px 14px;
            border-radius: 50px;
            color: #2c2b1f;
            font-weight: normal;
        }
        .subhead {
            text-align: center;
            color: #7a5a3a;
            border-bottom: 1px dashed #e2ca9c;
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-style: italic;
        }
        .stats-bar {
            background: #e7dbbc;
            border-radius: 60px;
            padding: 8px 18px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .score, .question-counter {
            background: #4f6b32;
            color: #fef2da;
            padding: 5px 16px;
            border-radius: 40px;
        }
        .question-card {
            background: #fffaf0;
            border-radius: 48px;
            padding: 20px 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.45rem;
            font-weight: 600;
            color: #2b4223;
            line-height: 1.3;
            margin-bottom: 25px;
            border-left: 5px solid #c9a86b;
            padding-left: 20px;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .answer-btn {
            background: #ffffff;
            border: 2px solid #decb9e;
            border-radius: 100px;
            padding: 12px 20px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            font-weight: 500;
            color: #2f3b25;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .answer-btn:hover:not(:disabled) {
            background: #f2e5cf;
            border-color: #b58b40;
            transform: scale(0.99);
        }
        .answer-letter {
            font-weight: bold;
            background: #e6d5b5;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }
        .true-false-btns {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }
        .tf-btn {
            background: #ffffff;
            border: 2px solid #decb9e;
            border-radius: 60px;
            padding: 15px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .tf-btn:hover {
            background: #f2e5cf;
            transform: scale(0.98);
        }
        .sort-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }
        .sort-category {
            background: #e7dbbc;
            border-radius: 24px;
            padding: 15px;
            flex: 1;
            min-width: 180px;
        }
        .sort-category h4 {
            text-align: center;
            margin: 0 0 12px 0;
            color: #3a5e2b;
        }
        .sort-dropzone {
            min-height: 150px;
            background: #fffaf0;
            border: 2px dashed #c9a86b;
            border-radius: 20px;
            padding: 10px;
        }
        .sort-card {
            background: #c9a86b;
            color: white;
            padding: 8px 12px;
            margin: 6px;
            border-radius: 40px;
            display: inline-block;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .sort-card.unplaced {
            background: #7b5f3a;
            cursor: pointer;
        }
        .input-field {
            width: 100%;
            padding: 14px 20px;
            font-size: 1.1rem;
            border: 2px solid #decb9e;
            border-radius: 60px;
            margin: 15px 0;
            font-family: inherit;
        }
        .feedback {
            margin-top: 20px;
            padding: 14px 20px;
            border-radius: 40px;
            background: #efe2cb;
            color: #2c4722;
            font-weight: 500;
            border-left: 8px solid #c9a86b;
        }
        .next-btn, .restart-btn {
            background: #7b5f3a;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: 0.1s;
        }
        .next-btn:hover, .restart-btn:hover {
            background: #5c4528;
            transform: scale(0.98);
        }
        .ending {
            text-align: center;
            background: #e3cfaa;
            border-radius: 48px;
            padding: 20px;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #ad946b;
            margin-top: 25px;
        }
        @media (max-width: 600px) {
            .game-box { padding: 18px; }
            .question-text { font-size: 1.2rem; }
            .sort-container { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="game-box" id="gameRoot">
    <h1>🧑‍🏛️ Марийский этнограф <small>смешанные форматы</small></h1>
    <div class="subhead">📖 8 вопросов: викторина, «верно/не верно», сортировка, ввод слова</div>
    <div class="stats-bar">
        <span class="score">🏆 Счёт: <span id="scoreValue">0</span></span>
        <span class="question-counter">❓ Вопрос <span id="currentQNum">1</span> / <span id="totalQ">8</span></span>
    </div>
    <div id="dynamicContent"></div>
    <footer>📚 Основано на документе «Марийский народ.doc»</footer>
</div>

<script>
    // ВОПРОСЫ С РАЗНЫМИ ФОРМАТАМИ
    // type: 'choice' - обычная викторина
    // type: 'truefalse' - верно/не верно
    // type: 'sort' - сортировка (две категории)
    // type: 'fillblank' - ввод слова

    const questions = [
        { // 0 - обычная викторина
            type: 'choice',
            text: "🗿 Вы нашли древнее марийское захоронение. В могиле лежат ногти, шиповник и холст. Что это значит?",
            options: [
                "А) Бытовые предметы, случайно попавшие в могилу",
                "Б) Ритуал: ногти для скал, шиповник от змеи, холст — мост в загробный мир",
                "В) Охотничьи талисманы",
                "Г) Средства для лечения"
            ],
            correct: 1,
            explanation: "✅ По марийским поверьям, ногти нужны, чтобы цепляться за скалы в царстве мёртвых, шиповник отгоняет змею и собаку у входа, холст — мост для души."
        },
        { // 1 - обычная викторина
            type: 'choice',
            text: "🏹 Какой оригинальный способ охоты на глухаря использовали луговые марийцы?",
            options: [
                "А) Ловили силками на ветках",
                "Б) Плетёная корзина с захлопывающейся крышкой",
                "В) Стреляли из лука ночью",
                "Г) Травили собаками"
            ],
            correct: 1,
            explanation: "📖 Марийцы применяли ловушку в виде плетёной корзины с захлопывающейся крышкой — для глухарей, тетеревов и куниц."
        },
        { // 2 - ВЕРНО / НЕ ВЕРНО (про одежду)
            type: 'truefalse',
            text: "🎭 Традиционный цвет марийской одежды — красный, а белый используется только в свадебных костюмах.",
            correct: false,  // не верно
            explanation: "❌ Не верно. Основной цвет марийского костюма — белый (домотканый холст). Красный — акцентный цвет-оберег в вышивке, но не основной."
        },
        { // 3 - обычная викторина (танец и музыка)
            type: 'choice',
            text: "🎵 Как называются традиционный марийский танец и инструмент, похожий на волынку?",
            options: [
                "А) Тарпан и мурда",
                "Б) Кандыра («Верёвочка») и шувыр",
                "В) Шымакш и карт",
                "Г) Ошмари и салам"
            ],
            correct: 1,
            explanation: "🎵 Танец — кандыра («Верёвочка»), инструмент — шувыр (разновидность волынки)."
        },
        { // 4 - СОРТИРОВКА (земледелие vs охота/рыболовство)
            type: 'sort',
            text: "🏺 Распределите орудия и занятия по категориям: «Земледелие» и «Охота / рыболовство».",
            categories: ["Земледелие", "Охота / рыболовство"],
            items: [
                { name: "Соха (шага)", category: "Земледелие" },
                { name: "Плетёная корзина-ловушка", category: "Охота / рыболовство" },
                { name: "Сабан (татарский плуг)", category: "Земледелие" },
                { name: "Морда (мурда) для рыбы", category: "Охота / рыболовство" }
            ],
            explanation: "✅ Соха и сабан — орудия земледелия. Корзина-ловушка и морда — для охоты и рыболовства."
        },
        { // 5 - обычная викторина (субэтносы)
            type: 'choice',
            text: "🏞️ Кто такие «кырык мары» и где они живут?",
            options: [
                "А) Луговые марийцы, междуречье Волги и Вятки",
                "Б) Восточные марийцы, в Башкирии",
                "В) Горные марийцы, правый берег Волги",
                "Г) Северо-западные марийцы, Кировская область"
            ],
            correct: 2,
            explanation: "🏔️ Кырык мары — горные марийцы. Живут на правом берегу Волги (и частично левом) на западе Марий Эл."
        },
        { // 6 - ВВОД СЛОВА (религия)
            type: 'fillblank',
            text: "🕯️ Верховного бога марийцев-язычников, сохранивших традиционную веру, зовут ________. (Введите имя)",
            correctAnswers: ["кугю-юмо", "кугу юмо", "кугуюмо", "kugu-yumo"],
            explanation: "✅ Верховный бог — Кугу-Юмо. Религия называется «чимари», моления проводят жрецы-карты в священных рощах."
        },
        { // 7 - обычная викторина (бортничество)
            type: 'choice',
            text: "🐝 Что такое «маскайол» у марийских пчеловодов?",
            options: [
                "А) Ритуальный танец",
                "Б) Обувь с шипами для лазания на бортные деревья",
                "В) Женский головной убор",
                "Г) Священная роща"
            ],
            correct: 1,
            explanation: "🍯 Маскайол («медвежьи лапы») — гнутая деревянная обувь с железными шипами для подъёма на деревья ради мёда диких пчёл."
        }
    ];

    const TOTAL_QS = questions.length;
    let currentIndex = 0;
    let score = 0;
    let gameFinished = false;
    let answerLocked = false;
    let currentSortState = {}; // для сортировки

    const dynamicDiv = document.getElementById('dynamicContent');
    const scoreSpan = document.getElementById('scoreValue');
    const currentQNumSpan = document.getElementById('currentQNum');
    const totalQSpan = document.getElementById('totalQ');
    totalQSpan.innerText = TOTAL_QS;

    function updateStatsUI() {
        scoreSpan.innerText = score;
        if (!gameFinished) {
            currentQNumSpan.innerText = currentIndex + 1;
        }
    }

    function normalizeAnswer(str) {
        return str.toLowerCase().replace(/[-\s]/g, '').replace(/ё/g, 'е');
    }

    function finishQuestion(points, explanation) {
        if (answerLocked) return;
        answerLocked = true;
        score += points;
        updateStatsUI();

        const feedbackDiv = document.getElementById('feedbackArea');
        if (feedbackDiv) {
            feedbackDiv.innerHTML = `<strong>${points > 0 ? '✅ +' + points + ' очков' : '❌ 0 очков'}</strong><br>${explanation}`;
            feedbackDiv.style.display = 'block';
        }

        const nextBtn = document.getElementById('nextQuestBtn');
        if (nextBtn) {
            nextBtn.style.display = 'block';
            nextBtn.addEventListener('click', () => {
                currentIndex++;
                if (currentIndex < TOTAL_QS) {
                    renderQuestion();
                    updateStatsUI();
                } else {
                    finishGame();
                }
            }, { once: true });
        }
    }

    // ОБЫЧНАЯ ВИКТОРИНА
    function renderChoice(q) {
        let html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="answers">
        `;
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65+idx);
            html += `
                <div class="answer-btn" data-opt-index="${idx}">
                    <span class="answer-letter">${letter}</span>
                    <span>${opt}</span>
                </div>
            `;
        });
        html += `
                </div>
                <div id="feedbackArea" class="feedback" style="display: none;"></div>
                <button id="nextQuestBtn" class="next-btn" style="display: none;">➡️ Следующий вопрос</button>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        
        const answerBtns = document.querySelectorAll('.answer-btn');
        answerBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (answerLocked) return;
                const selectedIdx = parseInt(btn.getAttribute('data-opt-index'));
                const isCorrect = (selectedIdx === q.correct);
                finishQuestion(isCorrect ? 10 : 0, q.explanation);
                // подсветка
                const allBtns = document.querySelectorAll('.answer-btn');
                allBtns.forEach((b, idx) => {
                    b.style.pointerEvents = 'none';
                    if (idx === q.correct) b.style.backgroundColor = '#cce6c6';
                    if (idx === selectedIdx && idx !== q.correct) b.style.backgroundColor = '#f3cfc3';
                });
            });
        });
    }

    // ВЕРНО / НЕ ВЕРНО
    function renderTrueFalse(q) {
        let html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="true-false-btns">
                    <button id="trueBtn" class="tf-btn">✅ Верно</button>
                    <button id="falseBtn" class="tf-btn">❌ Не верно</button>
                </div>
                <div id="feedbackArea" class="feedback" style="display: none;"></div>
                <button id="nextQuestBtn" class="next-btn" style="display: none;">➡️ Следующий вопрос</button>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        
        document.getElementById('trueBtn').addEventListener('click', () => {
            if (answerLocked) return;
            const isCorrect = (q.correct === true);
            finishQuestion(isCorrect ? 10 : 0, q.explanation);
        });
        document.getElementById('falseBtn').addEventListener('click', () => {
            if (answerLocked) return;
            const isCorrect = (q.correct === false);
            finishQuestion(isCorrect ? 10 : 0, q.explanation);
        });
    }

    // СОРТИРОВКА
    function renderSort(q) {
        let unplaced = [...q.items];
        let placed = { "Земледелие": [], "Охота / рыболовство": [] };
        
        function renderSortUI() {
            let html = `
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    <div class="sort-container">
                        <div class="sort-category">
                            <h4>🌾 Земледелие</h4>
                            <div class="sort-dropzone" id="dropzone0">
                                ${placed["Земледелие"].map(item => `<div class="sort-card" data-item="${item.name}" data-cat="Земледелие">${item.name}</div>`).join('')}
                            </div>
                        </div>
                        <div class="sort-category">
                            <h4>🏹 Охота / рыболовство</h4>
                            <div class="sort-dropzone" id="dropzone1">
                                ${placed["Охота / рыболовство"].map(item => `<div class="sort-card" data-item="${item.name}" data-cat="Охота / рыболовство">${item.name}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 15px; background: #e7dbbc; border-radius: 40px; padding: 10px;">
                        <strong>📦 Не распределено:</strong>
                        <div id="unplacedArea" style="min-height: 50px;">
                            ${unplaced.map(item => `<div class="sort-card unplaced" data-item="${item.name}">${item.name}</div>`).join('')}
                        </div>
                    </div>
                    <button id="checkSortBtn" class="next-btn" style="margin-top: 15px;">✅ Проверить сортировку</button>
                    <div id="feedbackArea" class="feedback" style="display: none;"></div>
                    <button id="nextQuestBtn" class="next-btn" style="display: none;">➡️ Следующий вопрос</button>
                </div>
            `;
            dynamicDiv.innerHTML = html;
            
            // обработчики перетаскивания (упрощённо — клик)
            document.querySelectorAll('.sort-card.unplaced').forEach(card => {
                card.addEventListener('click', (e) => {
                    const itemName = card.getAttribute('data-item');
                    const itemObj = unplaced.find(i => i.name === itemName);
                    if (itemObj) {
                        unplaced = unplaced.filter(i => i.name !== itemName);
                        // по умолчанию предлагаем в первую категорию, но лучше выберем по исходной категории
                        const targetCat = itemObj.category;
                        placed[targetCat].push(itemObj);
                        renderSortUI();
                    }
                });
            });
            document.querySelectorAll('.sort-card:not(.unplaced)').forEach(card => {
                card.addEventListener('click', (e) => {
                    const itemName = card.getAttribute('data-item');
                    const cat = card.getAttribute('data-cat');
                    const itemObj = placed[cat].find(i => i.name === itemName);
                    if (itemObj) {
                        placed[cat] = placed[cat].filter(i => i.name !== itemName);
                        unplaced.push(itemObj);
                        renderSortUI();
                    }
                });
            });
            
            document.getElementById('checkSortBtn').addEventListener('click', () => {
                if (answerLocked) return;
                let correctCount = 0;
                for (let item of q.items) {
                    const foundInCorrect = placed[item.category]?.some(i => i.name === item.name);
                    if (foundInCorrect) correctCount++;
                }
                const points = (correctCount === q.items.length) ? 10 : 0;
                finishQuestion(points, q.explanation + (points === 0 ? " Нужно разложить всё правильно." : ""));
            });
        }
        renderSortUI();
    }

    // ВВОД СЛОВА
    function renderFillBlank(q) {
        let html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <input type="text" id="fillInput" class="input-field" placeholder="Введите ответ...">
                <button id="checkFillBtn" class="next-btn" style="margin-top: 0;">✅ Ответить</button>
                <div id="feedbackArea" class="feedback" style="display: none;"></div>
                <button id="nextQuestBtn" class="next-btn" style="display: none;">➡️ Следующий вопрос</button>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        
        document.getElementById('checkFillBtn').addEventListener('click', () => {
            if (answerLocked) return;
            const userAnswer = document.getElementById('fillInput').value;
            const normalized = normalizeAnswer(userAnswer);
            const isCorrect = q.correctAnswers.some(ca => normalizeAnswer(ca) === normalized);
            finishQuestion(isCorrect ? 10 : 0, q.explanation);
        });
        document.getElementById('fillInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('checkFillBtn').click();
            }
        });
    }

    function renderQuestion() {
        if (currentIndex >= TOTAL_QS) {
            finishGame();
            return;
        }
        answerLocked = false;
        const q = questions[currentIndex];
        if (q.type === 'choice') renderChoice(q);
        else if (q.type === 'truefalse') renderTrueFalse(q);
        else if (q.type === 'sort') renderSort(q);
        else if (q.type === 'fillblank') renderFillBlank(q);
    }

    function finishGame() {
        gameFinished = true;
        let title = '', advice = '', emoji = '';
        if (score === TOTAL_QS * 10) {
            title = '🏅 Марийский профессор!';
            advice = 'Вы — настоящий эксперт!';
            emoji = '🎓✨';
        } else if (score >= 50) {
            title = '📚 Знаток марийской культуры';
            advice = 'Очень хороший результат!';
            emoji = '🌟';
        } else if (score >= 30) {
            title = '🧐 Этнограф-любитель';
            advice = 'Неплохо! У вас есть шансы узнать подробнее о марийцах.';
            emoji = '📖';
        } else {
            title = '🌱 Первооткрыватель';
            advice = 'Вы сделали первые шаги. У вас есть шансы узнать подробнее о марийцах.';
            emoji = '🔍';
        }
        
        const maxPossible = TOTAL_QS * 10;
        const endingHtml = `
            <div class="ending">
                <h2>🎬 Завершение экспедиции</h2>
                <p style="font-size: 1.3rem;">${emoji} ${title}</p>
                <p>Ваш счёт: <strong>${score}</strong> из ${maxPossible} очков.</p>
                <p>${advice}</p>
                <p>📌 Вы узнали о марийцах: похоронные обряды, охота, цвета одежды, танцы, земледелие, религия и многое другое.</p>
                <button id="fullRestartBtn" class="restart-btn">🔄 Пройти заново</button>
            </div>
        `;
        dynamicDiv.innerHTML = endingHtml;
        const restart = document.getElementById('fullRestartBtn');
        if (restart) {
            restart.addEventListener('click', () => {
                currentIndex = 0;
                score = 0;
                gameFinished = false;
                answerLocked = false;
                updateStatsUI();
                renderQuestion();
            });
        }
        currentQNumSpan.innerText = TOTAL_QS;
    }
    
    renderQuestion();
    updateStatsUI();
</script>
</body>
</html>
